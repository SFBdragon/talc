name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  job1:
    name: Nightly + MIRI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu, i686-unknown-linux-gnu
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: |
          # check the benchmarks
          rustup run nightly cargo check -p benches --bin microbench --verbose
          rustup run nightly cargo check -p benches --bin random_actions --verbose
          rustup run nightly cargo check -p benches --bin heap_efficiency --verbose

          # check for performance regressions
          rustup run nightly cargo run -p benches --bin high_alignment_test --release

          # test everything
          rustup run stable cargo test -p talc --all-targets --features=counters --verbose
          rustup run stable cargo test -p talc --doc --features=counters --verbose
          rustup run stable cargo test -p talc --all-targets --features=disable-realloc-in-place --verbose
          rustup run stable cargo test -p talc --doc --features=disable-realloc-in-place --verbose

          # miri
          rustup run nightly cargo miri test -p talc --all-targets --features=counters --verbose
          rustup run nightly cargo miri test -p talc --all-targets --target i686-unknown-linux-gnu --features=disable-realloc-in-place --verbose
          # rustup run nightly cargo miri test -p talc --doc --features=counters --verbose
          # rustup run nightly cargo miri test -p talc --doc --target i686-unknown-linux-gnu --features=disable-realloc-in-place --verbose

          # nightly
          rustup run nightly cargo test -p talc --features=nightly,counters --verbose

  job2:
    name: Check Stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: |
          # STABLE CONFIGURATIONS
          rustup run stable cargo check -p talc --verbose
          rustup run stable cargo check -p talc --features=disable-grow-in-place --verbose
          rustup run stable cargo check -p talc --features=disable-realloc-in-place --verbose
          rustup run stable cargo check -p talc --features=disable-grow-in-place,disable-realloc-in-place --verbose
          rustup run stable cargo check -p talc --features=counters --verbose
          rustup run stable cargo check -p talc --target wasm32-unknown-unknown --verbose
          rustup run stable cargo check -p talc --features=disable-grow-in-place --target wasm32-unknown-unknown --verbose
          rustup run stable cargo check -p talc --features=disable-realloc-in-place --target wasm32-unknown-unknown --verbose

          # check that the examples aren't broken
          rustup run stable cargo check -p talc --example allocator_api --verbose
          rustup run stable cargo check -p talc --example global_allocator --verbose
          rustup run stable cargo check -p talc --example no_std_global_allocator --verbose

  job3:
    name: Check MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          rustup toolchain add 1.64.0 --profile minimal
          rustup run 1.64.0 cargo check -p talc --features=counters --verbose

  job4:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: |
          # check that the documentation isn't broken
          rustup run stable cargo test -p talc --doc
          rustup run stable cargo test -p doctest --doc
          just check-wasm32-docs talc
          just check-wasm32-docs doctest
